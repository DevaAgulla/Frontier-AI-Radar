# ── Frontier AI Radar — Production Topology ──────────────────────────────────
#
#  api         ×2 — stateless FastAPI pods (read + chat only, no pipeline)
#  worker      ×2 — Celery digest workers (LangGraph pipeline)
#  audio       ×1 — Celery audio+blob worker (ElevenLabs + Azure)
#  beat        ×1 — Celery beat scheduler (replaces APScheduler)
#  nginx       ×1 — load balancer / reverse proxy
#
#  Database : Azure PostgreSQL  — DATABASE_URL from Backend/.env
#  Cache/Broker: Azure Redis    — REDIS_URL    from Backend/.env
#  No local postgres or redis containers needed.

services:

  # ── Shared build definition (all app services use the same image) ─────────
  x-app: &app
    build:
      context: .               # Dockerfile lives at repo root
      dockerfile: Dockerfile
    env_file: ./Backend/.env   # DATABASE_URL, REDIS_URL, API keys — all from here
    restart: always

  # ── API pods (×2, stateless) ──────────────────────────────────────────────
  api:
    <<: *app
    command: python -m api.main
    deploy:
      replicas: 2
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      retries: 3

  # ── Digest workers (×2) ───────────────────────────────────────────────────
  # --pool=solo  : each worker process owns its asyncio event loop
  # -c 1         : one pipeline task at a time per process (CPU+network heavy)
  worker:
    <<: *app
    command: >
      celery -A workers.celery_app worker
        -Q digest_q -c 1 --pool=solo -l info -n worker@%h
    deploy:
      replicas: 2

  # ── Audio + blob worker (×1, I/O bound) ──────────────────────────────────
  audio:
    <<: *app
    command: >
      celery -A workers.celery_app worker
        -Q audio_q,blob_q -c 2 -l info -n audio@%h

  # ── Beat scheduler (singleton — do NOT scale) ────────────────────────────
  beat:
    <<: *app
    command: celery -A workers.celery_app beat -l info

  # ── Nginx load balancer ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
