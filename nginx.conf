events { worker_connections 4096; }

http {
    # API pod pool — round-robin across replicas
    upstream api_pool {
        least_conn;
        server api:8000;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        # SSE chat streaming — disable buffering so tokens reach browser instantly
        location /api/v1/chat/ask {
            proxy_pass         http://api_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 120s;
        }

        # All other API traffic
        location / {
            proxy_pass         http://api_pool;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;

            # Cache GET digest/run responses at nginx layer (30s TTL)
            # Longer-lived data is cached at Redis layer inside the app.
            proxy_cache_valid  200 30s;
        }
    }
}
